apiVersion: aws.platform.upbound.io/v1alpha1
kind: Ingress
metadata:
  name: configuration-aws-lb-controller
  labels:
    platform.upbound.io/deletion-ordering: enabled
  namespace: default
spec:
  parameters:
    type: alb
    region: us-west-2
    # Reference the cluster by platform id; the composition resolves its
    # published status (connection config, vpc id, cluster name) via
    # extra-resources. No raw vpcId or hardcoded ProviderConfig name.
    computeRef:
      id: my-compute
