apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: ingresses.aws.platform.upbound.io
spec:
  group: aws.platform.upbound.io
  names:
    categories:
    - crossplane
    kind: Ingress
    plural: ingresses
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: >-
          Ingress installs cluster ingress / load-balancing. The controller
          implementation (the AWS Load Balancer Controller, via Helm) is an L3
          detail, not leaked API surface.
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                description: Ingress configuration parameters.
                properties:
                  type:
                    type: string
                    enum: [alb]
                    default: alb
                    description: >-
                      Ingress type. Implemented in L3; adding nginx or Gateway API
                      later is an additive enum value, not a new API.
                  computeRef:
                    type: object
                    description: >-
                      Reference, by platform id, to the Compute (cluster) this
                      ingress installs into. Resolved in L3 from Compute's
                      published status (connection config, vpc id, cluster name) —
                      no Crossplane ref/selector machinery, no raw vpcId.
                    properties:
                      id:
                        type: string
                        description: Platform id of the Compute (its metadata name).
                    required:
                    - id
                  region:
                    type: string
                    description: Cloud region the controller runs in.
                  reclaimPolicy:
                    type: string
                    enum: [Delete, Retain]
                    default: Delete
                    description: >-
                      Outcome intent (Kubernetes PersistentVolume vocabulary). The
                      mapping to Crossplane management policies is owned by the
                      composition; this field does not echo Crossplane machinery.
                  overrides:
                    type: object
                    description: >-
                      Bounded escape hatch with an explicit support boundary.
                    properties:
                      providerConfigName:
                        type: string
                        description: >-
                          Crossplane ProviderConfig for account/credential
                          selection. Defaults to "default".
                required:
                - computeRef
            required:
            - parameters
          status:
            type: object
            properties:
              ready:
                type: boolean
                description: Whether the ingress controller's identity is established.
              roleArn:
                type: string
                description: ARN of the controller's IAM role (from the nested Identity).
        required:
        - spec
        type: object
